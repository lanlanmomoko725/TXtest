services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: TXtest-app

    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    volumes:
      - ./uploads:/app/dist/public/uploads
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - TXtest-network

  db:
    image: mysql:8.0
    container_name: TXtest-db
    env_file:
      - .env.local
    environment:
      - MYSQL_ROOT_PASSWORD=TXtest725
      - MYSQL_DATABASE=TXtest
      - MYSQL_USER=TXtest
      - MYSQL_PASSWORD=TXtest725
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - TXtest-network

  nginx:
    image: nginx:alpine
    container_name: TXtest-nginx
    ports:
      - "81:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/dist/public/uploads:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - TXtest-network

volumes:
  mysql-data:

networks:
  TXtest-network:
    driver: bridge