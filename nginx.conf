events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_max_body_size 15m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_per_ip:10m rate=1r/s;

    server {
        listen 80;
        server_name _;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://o.alicdn.com https://g.alicdn.com; script-src-elem 'self' https://o.alicdn.com https://g.alicdn.com; style-src 'self' 'unsafe-inline' https://g.alicdn.com; style-src-elem 'self' 'unsafe-inline' https://g.alicdn.com; img-src 'self' https: data: blob:; font-src 'self' data: https://g.alicdn.com; connect-src 'self' https://*.aliyuncs.com https://*.aliyun.com https://*.alicdn.com; frame-src 'self' https://player.bilibili.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location /assets/ {
            proxy_pass http://app:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /uploads/ {
            alias /app/dist/public/uploads/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Access-Control-Allow-Origin "*" always;
            add_header Content-Disposition "inline" always;
            add_header Content-Security-Policy "default-src 'none'; img-src 'self' data:; media-src 'none'; script-src 'none'; object-src 'none'; sandbox" always;
            add_header X-Content-Type-Options "nosniff" always;
            error_page 404 = @uploads_not_found;
        }

        location @uploads_not_found {
            internal;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            return 404;
        }

        location = /api/upload {
            limit_req zone=upload_per_ip burst=5 nodelay;
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        error_page 413 /api/upload-error;
        location = /api/upload-error {
            internal;
            default_type application/json;
            return 413 '{"error":"文件大小超过服务器限制（最大 10MB），请压缩后再上传"}';
        }
    }
}
