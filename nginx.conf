events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 上传文件大小限制（与后端 10MB 对齐，留余量设 15m）
    client_max_body_size 15m;

    # 代理超时（手机网络较慢，适当放宽）
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name _;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://player.bilibili.com https://www.bilibili.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 静态文件直接由 Nginx 提供（比 Node.js 快得多）
        location /assets/ {
            proxy_pass http://app:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Serve uploaded files directly from Nginx filesystem (faster & more reliable than proxying to Node.js)
        location /uploads/ {
            alias /app/dist/public/uploads/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Content-Type-Options "nosniff" always;

            # Do not cache 404 errors
            error_page 404 = @uploads_not_found;
        }

        location @uploads_not_found {
            internal;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            return 404;
        }

        # 所有 API 和页面请求转发到 Node 服务
        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（如果以后需要）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 自定义 413 错误（文件太大），返回 JSON 方便前端解析
        error_page 413 /api/upload-error;
        location = /api/upload-error {
            internal;
            default_type application/json;
            return 413 '{"error":"文件大小超过服务器限制（最大 10MB），请压缩后再上传"}';
        }
    }
}
